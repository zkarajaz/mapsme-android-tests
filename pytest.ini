[pytest]
testpaths = tests
addopts = 
    --alluredir=allure-results
    -v
    --tb=short
markers =
    api: API tests
    ui: Mobile/Web UI tests
    smoke: Smoke tests
    
# Запуск всех тестов с отчётами:
# pytest

# Только API тесты:
# pytest -m api

# Открыть Allure отчёт:
# allure serve allure-results