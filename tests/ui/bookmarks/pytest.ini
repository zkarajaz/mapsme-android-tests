[pytest]
addopts = -v --tb=short --strict-markers --alluredir=reports/allure_results
markers =
    smoke: Быстрый прогон
    regression: Полный регресс
    offline: Оффлайн
    creation: Создание меток
    edit: Редактирование
    delete: Удаление
    folders: Папки
    search: Поиск
    map_display: Карта
    sync: Синхронизация
log_cli = true
log_cli_level = INFO
log_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_date_format = %H:%M:%S
